services:
  api:
    image: ghcr.io/${GHCR_OWNER:-TongWu}/javdb-autospider-api:${API_TAG:-latest}
    container_name: javdb-autospider-api
    restart: unless-stopped
    env_file:
      - .env.api
    ports:
      - "${API_PORT:-8100}:8100"
    volumes:
      - api-reports:/app/reports
      - api-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8100/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: javdb-autospider-web:local
    container_name: javdb-autospider-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://api:8100}

volumes:
  api-reports:
  api-logs:
