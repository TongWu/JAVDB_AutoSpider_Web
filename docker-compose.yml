services:
  api:
    image: ghcr.io/${GHCR_OWNER:-tongwu}/javdb-autospider-api:${API_TAG:-latest}
    container_name: javdb-autospider-api
    restart: unless-stopped
    # All BE settings (admin credentials, JavDB cookie, qB URL, storage
    # backend, ingestion mode, GH Actions token, etc.) come from the main
    # repo's config.py mounted read-only at /app/config.py. The BE reads
    # this via the cfg() helper; env vars below still override per-setting.
    #
    # See: https://github.com/TongWu/JAVDB_AutoSpider_CICD/blob/main/config.py.example
    volumes:
      - ${CONFIG_PY_PATH:-../config.py}:/app/config.py:ro
      - api-reports:/app/reports
      - api-logs:/app/logs
    ports:
      - "${API_PORT:-8100}:8100"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8100/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Override individual config.py values via env if needed (CI / secret mgr).
    # TEST_MODE=1 enables /api/test/reset used by Playwright fixtures.
    environment:
      API_SECRET_KEY: ${API_SECRET_KEY:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      TEST_MODE: ${TEST_MODE:-}
      # Multiple uvicorn workers each hold an independent in-memory
      # ACTIVE_TOKENS dict, so /api/test/reset can only clear sessions on
      # the worker that handles the reset request — sessions on the peer
      # workers keep accumulating and eventually trip MAX_SESSIONS_PER_USER,
      # surfacing as 403 "Too many active sessions" on later logins. E2E
      # sets WEB_CONCURRENCY=1 to force a single shared session store.
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-}

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: javdb-autospider-web:local
    container_name: javdb-autospider-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://api:8100}

volumes:
  api-reports:
  api-logs:
