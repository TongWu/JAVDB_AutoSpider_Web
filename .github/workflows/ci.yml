name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Regenerate API types from main repo schema
        # Confirms the committed src/types/api.gen.ts matches the upstream
        # schema. Fails CI if drift exists.
        # CICD_REPO_TOKEN is a PAT with read access to the private
        # TongWu/JAVDB_AutoSpider_CICD repo; required to fetch openapi.json.
        env:
          OPENAPI_URL: https://raw.githubusercontent.com/TongWu/JAVDB_AutoSpider_CICD/main/docs/api/openapi.json
          OPENAPI_TOKEN: ${{ secrets.CICD_REPO_TOKEN }}
        run: |
          npm run gen:api-types
          if ! git diff --quiet src/types/api.gen.ts; then
            echo "::error::src/types/api.gen.ts is out of sync with upstream openapi.json."
            echo "Run 'npm run gen:api-types' locally, or trigger the 'Re-vendor OpenAPI types' workflow, and commit the result."
            git --no-pager diff src/types/api.gen.ts | head -100
            exit 1
          fi

      - name: Refresh query Contract Golden from main repo
        # ADR-018 D6 freshness check: re-fetch the Python-main query golden and
        # confirm the committed vendored copy matches. Catches Python-side drift
        # (stale vendor). Mirrors the api.gen.ts gen-diff step above.
        env:
          QUERY_GOLDEN_URL: https://raw.githubusercontent.com/TongWu/JAVDB_AutoSpider_CICD/main/docs/api/contract/query-builders.golden.json
          QUERY_GOLDEN_TOKEN: ${{ secrets.CICD_REPO_TOKEN }}
        run: |
          npm run gen:query-golden
          if ! git diff --quiet server/__tests__/fixtures/query-builders.golden.json; then
            echo "::error::Vendored query golden is out of sync with Python main."
            echo "A builder changed upstream — run 'npm run gen:query-golden' and reconcile the TS builders."
            git --no-pager diff server/__tests__/fixtures/query-builders.golden.json | head -100
            exit 1
          fi

      - name: Unit tests
        run: npm run test:unit -- --coverage

      - name: Contract tests
        run: npm run test:contract

      - name: Server tests
        # Runs the Hono backend route suite incl. the ADR-018 query-contract
        # conformance test (server/__tests__/query-contract.test.ts), which
        # catches TS-side builder drift against the vendored golden.
        run: npm run test:server

      - name: Build
        run: npm run build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
