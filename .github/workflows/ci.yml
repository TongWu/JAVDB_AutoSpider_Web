name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Regenerate API types from main repo schema
        # Confirms the committed src/types/api.gen.ts matches the upstream
        # schema. Fails CI if drift exists.
        env:
          OPENAPI_URL: https://raw.githubusercontent.com/TongWu/JAVDB_AutoSpider_CICD/main/docs/api/openapi.json
        run: |
          npm run gen:api-types
          if ! git diff --quiet src/types/api.gen.ts; then
            echo "::error::src/types/api.gen.ts is out of sync with upstream openapi.json."
            echo "Run 'npm run gen:api-types' locally and commit the result."
            git --no-pager diff src/types/api.gen.ts | head -100
            exit 1
          fi

      - name: Unit tests
        run: npm run test:unit -- --coverage

      - name: Contract tests
        run: npm run test:contract

      - name: Build
        run: npm run build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
