name = "javdb-autospider-web"
main = "server/worker.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist"
binding = "ASSETS"

[vars]
ENVIRONMENT = "production"
INGESTION_MODE = "github"
BACKEND_VERSION = "2.0.0"

[[d1_databases]]
binding = "HISTORY_DB"
database_name = "javdb-history"
database_id = "9c4be4f9-155e-4f41-b59f-bb6530f28249"

[[d1_databases]]
binding = "REPORTS_DB"
database_name = "javdb-reports"
database_id = "90f5ba3a-f539-4895-9f3d-853494003f2b"

[[d1_databases]]
binding = "OPERATIONS_DB"
database_name = "javdb-operations"
database_id = "6ded7c0e-3013-48ee-a550-c5e207177204"
